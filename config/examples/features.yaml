  last: 450000.0
  dma20: 440000.0
  support: 430000.0
  resistance: 460000.0
  rvol: 0.6  # Low volume typical for high-price stocks
  rs_strength: 0.15
  vwap_diff: 0.008

# ============================================================================
# EDGE CASE 12: NEAR-THRESHOLD SCENARIOS
# ============================================================================

# Just below breakout threshold (gap = 0.011, threshold = 0.01)
EDGE_NEAR_BREAKOUT_THRESHOLD:
  last: 109.89  # 0.1% below resistance
  dma20: 105.0
  support: 100.0
  resistance: 110.0
  rvol: 1.25  # Just above rvol threshold (1.2)
  rs_strength: 0.11  # Just above rs threshold (0.1)
  vwap_diff: 0.0099  # Just below 1%

# Just above breakdown threshold
EDGE_NEAR_BREAKDOWN_THRESHOLD:
  last: 100.11  # 0.1% above support
  dma20: 105.0
  support: 100.0
  resistance: 110.0
  rvol: 1.19  # Just below rvol threshold (1.2)
  rs_strength: -0.09  # Just above rs threshold (-0.1)
  vwap_diff: -0.0099  # Just above -1%

# ============================================================================
# EDGE CASE 13: SUSTAINABILITY TEST CASES
# ============================================================================

# High momentum but low sustainability
